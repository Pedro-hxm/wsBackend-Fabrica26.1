<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receitas</title>
</head>
<body>
    <h1>🍲 App de Receitas</h1>

    {% for item in dados %}

  <h2>{{ item.receita.nome }}</h2>

  <ul>

    {% for ing in item.ingredientes %}

      <li>

        {{ ing.quantidade }} {{ ing.unidade }} de {{ ing.ingrediente.nome }}

      </li>

    {% endfor %}

  </ul>

  {% endfor %}
  
</body>
</html>
