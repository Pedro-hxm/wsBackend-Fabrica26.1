<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Receitas</title>
</head>
<body>
    <h1>📋 Gerenciar Receitas</h1>

    <p>
        <a href="{% url 'criar_receita' %}">➕ Nova Receita</a>
    </p>

    <ul>
        {% for receita in receitas %}
            <li>
                <strong>{{ receita.nome }}</strong> - {{ receita.categoria }}
            </li>
        {% empty %}
            <li>Nenhuma receita cadastrada ainda.</li>
        {% endfor %}
    </ul>

    <br>
    <a href="{% url 'home' %}">Voltar para a home</a>
</body>
</html>
