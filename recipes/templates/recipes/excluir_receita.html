<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excluir Receita</title>
</head>
<body>
    <h1>🗑️ Excluir Receita</h1>

    <p>Tem certeza que deseja excluir a receita <strong>{{ receita.nome }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Sim, excluir</button>
    </form>

    <br>
    <a href="{% url 'gerenciar_receitas' %}">Cancelar</a>
</body>
</html>
